name: check videodl status daily

on:
  schedule:
    - cron: "0 20 * * *"
  workflow_dispatch:

jobs:
  check:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
      
      - name: Install unzip
        run: sudo apt-get update && sudo apt-get install -y unzip

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      
      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "24"
      
      - name: Install Chrome
        id: setup-chrome
        uses: browser-actions/setup-chrome@v2
        with:
          chrome-version: stable

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .
      
      - name: Install ffmpeg
        run: |
          sudo apt-get update
          sudo apt-get install -y ffmpeg
      
      - name: Install N_m3u8DL-RE
        run: |
          curl -L \
            -o nm3u8dl.tar.gz \
            https://github.com/nilaoda/N_m3u8DL-RE/releases/download/v0.5.1-beta/N_m3u8DL-RE_v0.5.1-beta_linux-x64_20251029.tar.gz
          tar -xzf nm3u8dl.tar.gz
          chmod +x N_m3u8DL-RE
          sudo mv N_m3u8DL-RE /usr/local/bin/
          N_m3u8DL-RE --help

      - name: Install Bento4
        run: |
          curl -L \
            -o bento4.zip \
            https://www.bok.net/Bento4/binaries/Bento4-SDK-1-6-0-641.x86_64-unknown-linux.zip
          unzip -q bento4.zip
          sudo mv Bento4-SDK-1-6-0-641.x86_64-unknown-linux/bin/* /usr/local/bin/
          mp4decrypt --version || true

      - name: Run videodl checks
        run: |
          python scripts/daily_check_videodl.py --output daily_test_results/videodl_status.json

      - name: Commit updated videodl status & preview videos
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: update videodl status & preview videos"
          file_pattern: daily_test_results/**